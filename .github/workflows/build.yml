name: Build BIBI OS ISO

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get install -y xorriso squashfs-tools rsync

      - name: Download Ubuntu ISO
        run: wget -q "https://releases.ubuntu.com/jammy/ubuntu-22.04.5-desktop-amd64.iso" -O ubuntu.iso

      - name: Extract ISO
        run: |
          mkdir -p iso_work
          sudo mount -o loop ubuntu.iso /mnt
          sudo rsync -a /mnt/. iso_work/
          sudo umount /mnt

      - name: List boot files
        run: find iso_work/boot iso_work/EFI -type f 2>/dev/null || find iso_work -name "*.img" -o -name "*.efi" 2>/dev/null

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: BIBI-OS
          path: bibi-os.iso
