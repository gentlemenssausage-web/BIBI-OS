name: Build BIBI OS ISO

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: sudo apt-get install -y xorriso squashfs-tools genisoimage isolinux

      - name: Download Ubuntu ISO
        run: wget -q "https://releases.ubuntu.com/jammy/ubuntu-22.04.5-desktop-amd64.iso" -O ubuntu.iso

      - name: Extract ISO
        run: |
          mkdir -p iso_extract squashfs_root
          sudo mount -o loop ubuntu.iso iso_extract
          sudo cp -a iso_extract/. iso_work/
          sudo umount iso_extract

      - name: Modify OS name
        run: |
          sudo sed -i 's/Ubuntu/BIBI OS/g' iso_work/.disk/info || true

      - name: Copy branding files
        run: |
          sudo cp config/includes.chroot/usr/share/wallpapers/bibi.jpg iso_work/

      - name: Rebuild ISO
        run: |
          sudo xorriso -as mkisofs -o bibi-os.iso  -J -R -V "BIBI OS" iso_work/

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: BIBI-OS
          path: bibi-os.iso
