name: Build BIBI OS ISO

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install live-build
        run: sudo apt-get install -y live-build

      - name: Build ISO
        run: |
          sudo lb config --binary-images iso-hybrid
          sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: BIBI-OS
          path: "*.iso"

      - name: Pre-configure apt
        run: |
          echo 'APT::Get::force-yes "true";' | sudo tee /etc/apt/apt.conf.d/90forceyes
          sudo apt-get install -y equivs
          equivs-control syslinux-fake
          sed -i 's/Package:.*/Package: syslinux-themes-ubuntu-oneiric/' syslinux-fake
          equivs-build syslinux-fake
          sudo dpkg -i syslinux-themes-ubuntu-oneiric*.deb
