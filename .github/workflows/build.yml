name: Build BIBI OS ISO

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install live-build
        run: sudo apt-get install -y live-build

      - name: Fix broken packages
        run: |
          sudo mkdir -p chroot/etc/apt/preferences.d
          echo -e "Package: syslinux-themes-ubuntu-oneiric\nPin: release *\nPin-Priority: -1\n\nPackage: gfxboot-theme-ubuntu\nPin: release *\nPin-Priority: -1" | sudo tee /etc/apt/preferences.d/block-packages

      - name: Build ISO
        run: sudo lb build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: BIBI-OS
          path: "*.iso"
